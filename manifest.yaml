apiVersion: v1
kind: ServiceAccount
metadata:
  name: hermes-hermes-agent
  labels:
    helm.sh/chart: hermes-agent-0.1.0
    app.kubernetes.io/name: hermes-agent
    app.kubernetes.io/instance: hermes
    app.kubernetes.io/version: "0.8.0"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/part-of: hermes-agent
automountServiceAccountToken: false
---
# Source: hermes-agent/templates/configmap.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: hermes-hermes-agent-config
  labels:
    helm.sh/chart: hermes-agent-0.1.0
    app.kubernetes.io/name: hermes-agent
    app.kubernetes.io/instance: hermes
    app.kubernetes.io/version: "0.8.0"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/part-of: hermes-agent
data:
  config.yaml: |
    agent:
      gateway_timeout: 1800
      max_turns: 90
      restart_drain_timeout: 60
      tool_use_enforcement: auto
    browser:
      allow_private_urls: false
      command_timeout: 30
      inactivity_timeout: 120
    compression:
      enabled: true
      protect_last_n: 20
      target_ratio: 0.2
      threshold: 0.5
    display:
      interim_assistant_messages: true
      tool_progress: all
    model:
      base_url: https://openrouter.ai/api/v1
      default: anthropic/claude-opus-4.6
      provider: auto
    security:
      redact_secrets: true
      tirith_enabled: true
      tirith_fail_open: true
    terminal:
      backend: local
      cwd: .
      timeout: 180
