# Source: hermes-agent/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hermes-hermes-agent
  labels:
    helm.sh/chart: hermes-agent-0.1.0
    app.kubernetes.io/name: hermes-agent
    app.kubernetes.io/instance: hermes
    app.kubernetes.io/version: "0.8.0"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/part-of: hermes-agent
spec:
  replicas: 1
  revisionHistoryLimit: 5
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: hermes-agent
      app.kubernetes.io/instance: hermes
  template:
    metadata:
      labels:
        helm.sh/chart: hermes-agent-0.1.0
        app.kubernetes.io/name: hermes-agent
        app.kubernetes.io/instance: hermes
        app.kubernetes.io/version: "0.8.0"
        app.kubernetes.io/managed-by: Helm
        app.kubernetes.io/part-of: hermes-agent
      annotations:
        checksum/config: aa10a4a43b3aa1531efec9261bf34deb1d7ad17d98c413382ec49a317161cf54
        checksum/secret: 01ba4719c80b6fe911b091a7c05124b64eeece964e09c058ef8f9805daca546b
    spec:
      serviceAccountName: hermes-hermes-agent
      automountServiceAccountToken: false
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        runAsGroup: 1000
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: bootstrap-config
          image: "nousresearch/hermes-agent:0.8.0"
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -ec
          args:
            - |
              set -eu
              mkdir -p "/opt/data/home"
              if [ -f "/bootstrap/config.yaml" ]; then
                if [ "true" = "true" ] || [ ! -f "/opt/data/config.yaml" ]; then
                  cp "/bootstrap/config.yaml" "/opt/data/config.yaml"
                fi
              fi
              if [ -f "/bootstrap/SOUL.md" ]; then
                if [ "true" = "true" ] || [ ! -f "/opt/data/SOUL.md" ]; then
                  cp "/bootstrap/SOUL.md" "/opt/data/SOUL.md"
                fi
              fi
          env:
            - name: HERMES_HOME
              value: "/opt/data"
          volumeMounts:
            - name: data
              mountPath: /opt/data
            - name: bootstrap
              mountPath: /bootstrap
              readOnly: true
            - name: tmp
              mountPath: /tmp
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
              - ALL
            readOnlyRootFilesystem: true
            seccompProfile:
              type: RuntimeDefault
      containers:
        - name: hermes-agent
          image: "nousresearch/hermes-agent:0.8.0"
          imagePullPolicy: IfNotPresent
          args:
            - gateway
            - run
          workingDir: /opt/hermes
          env:
            - name: HERMES_HOME
              value: "/opt/data"
            - name: HOME
              value: "/opt/data/home"
            - name: DISCORD_ALLOWED_USERS
              value: ""
            - name: DISCORD_HOME_CHANNEL
              value: ""
            - name: GATEWAY_ALLOW_ALL_USERS
              value: "false"
            - name: HERMES_HUMAN_DELAY_MAX_MS
              value: "2500"
            - name: HERMES_HUMAN_DELAY_MIN_MS
              value: "800"
            - name: HERMES_HUMAN_DELAY_MODE
              value: "off"
            - name: IMAGE_TOOLS_DEBUG
              value: "false"
            - name: MOA_TOOLS_DEBUG
              value: "false"
            - name: SIGNAL_ALLOWED_USERS
              value: ""
            - name: SIGNAL_GROUP_ALLOWED_USERS
              value: ""
            - name: SLACK_ALLOWED_USERS
              value: ""
            - name: TELEGRAM_ALLOWED_USERS
              value: ""
            - name: TELEGRAM_HOME_CHANNEL
              value: ""
            - name: VISION_TOOLS_DEBUG
              value: "false"
            - name: WEB_TOOLS_DEBUG
              value: "false"
            - name: WHATSAPP_ALLOWED_USERS
              value: ""
            - name: WHATSAPP_ENABLED
              value: "false"
          resources:
            limits:
              cpu: "2"
              memory: 4Gi
            requests:
              cpu: 500m
              memory: 1Gi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
              - ALL
            readOnlyRootFilesystem: true
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - name: data
              mountPath: /opt/data
            - name: tmp
              mountPath: /tmp
            - name: dshm
              mountPath: /dev/shm
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: hermes-hermes-agent-data
        - name: bootstrap
          configMap:
            name: hermes-hermes-agent-config
        - name: tmp
          emptyDir: {}
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: "1Gi"
      terminationGracePeriodSeconds: 120
