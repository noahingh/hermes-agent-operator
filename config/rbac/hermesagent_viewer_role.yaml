# This rule is not used by the project hermes-agent-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to agents.hermes-agent-operator.xyz resources.
# This role is intended for users who need visibility into these resources
# without permissions to modify them. It is ideal for monitoring purposes and limited-access viewing.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: hermes-agent-operator
    app.kubernetes.io/managed-by: kustomize
  name: hermesagent-viewer-role
rules:
- apiGroups:
  - agents.hermes-agent-operator.xyz
  resources:
  - hermesagents
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - agents.hermes-agent-operator.xyz
  resources:
  - hermesagents/status
  verbs:
  - get
