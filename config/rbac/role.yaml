---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - agents.hermes-agent-operator.xyz
  resources:
  - hermesagents
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - agents.hermes-agent-operator.xyz
  resources:
  - hermesagents/finalizers
  verbs:
  - update
- apiGroups:
  - agents.hermes-agent-operator.xyz
  resources:
  - hermesagents/status
  verbs:
  - get
  - patch
  - update
