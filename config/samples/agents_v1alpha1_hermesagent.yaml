apiVersion: agents.hermes-agent-operator.xyz/v1alpha1
kind: HermesAgent
metadata:
  labels:
    app.kubernetes.io/name: hermes-agent-operator
    app.kubernetes.io/managed-by: kustomize
  name: hermesagent-sample
spec:
  hermes:
    config:
      model:
        base_url: https://ollama.com/v1
        default: kimi-k2.6
        provider: ollama-cloud
    workspace:
      files:
        SOUL.md: |
          # Personality

          You are a pragmatic senior engineer with strong taste.
          You optimize for truth, clarity, and usefulness over politeness theater.
        TEST.md: |
          # Test File

          This is a test file for the Hermes Agent.
    storage:
      persistence:
        enabled: true
        size: 2Gi
    probes:
      # readiness is enabled by default; tune or disable it here.
      readiness:
        initialDelaySeconds: 5
        periodSeconds: 10
      # liveness and startup are opt-in: created only when configured.
      liveness:
        enabled: true
        initialDelaySeconds: 15
        periodSeconds: 20
    envFrom:
      - secretRef:
          name: ollama-api-secret
    skills:
      - identifier: official/finance/stocks
      - identifier: skills-sh/doany-ai/skills/ai-music
    crons:
      - name: Check server status - 2h
        schedule: every 2h
        prompt: Check server status
      - name: Check server status - 4h
        schedule: every 4h
        prompt: Check server status
    bundles:
      - name: finance
        description: Finance helpers
        skills:
          - stocks
