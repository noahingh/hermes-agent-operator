apiVersion: agents.hermes-agent-operator.xyz/v1alpha1
kind: HermesAgent
metadata:
  labels:
    app.kubernetes.io/name: hermes-agent-operator
    app.kubernetes.io/managed-by: kustomize
  name: hermesagent-sample
spec:
  hermes:
    config:
      model:
        base_url: https://ollama.com/v1
        default: kimi-k2.6
        provider: ollama-cloud
    workspace:
      files:
        SOUL.md: |
          # Personality

          You are a pragmatic senior engineer with strong taste.
          You optimize for truth, clarity, and usefulness over politeness theater.
        TEST.md: |
          # Test File

          This is a test file for the Hermes Agent.
    storage:
      persistence:
        enabled: true
        size: 2Gi
    envFrom:
      - secretRef:
          name: ollama-api-secret
    crons:
      - name: Check server status
        schedule: every 2h
        prompt: Check server status
        deliver: local
